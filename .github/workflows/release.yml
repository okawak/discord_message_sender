name: Release Plugin

on:
  push:
    tags:
      - "*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Extract version from tag
        id: get_version
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]
          echo "VERSION=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          cache-workspaces: |
            .

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release version
        run: |
          PACKAGE_VERSION="$(bun -e "const p = await Bun.file('package.json').json(); console.log(p.version)")"
          MANIFEST_VERSION="$(bun -e "const p = await Bun.file('manifest.json').json(); console.log(p.version)")"
          CARGO_VERSION="$(sed -n '/^\[workspace\.package\]/,/^\[/ s/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          MIN_APP_VERSION="$(bun -e "const versions = await Bun.file('versions.json').json(); console.log(versions['${{ steps.get_version.outputs.VERSION }}'] ?? '')")"
          test "$PACKAGE_VERSION" = "${{ steps.get_version.outputs.VERSION }}"
          test "$MANIFEST_VERSION" = "${{ steps.get_version.outputs.VERSION }}"
          test "$CARGO_VERSION" = "${{ steps.get_version.outputs.VERSION }}"
          test -n "$MIN_APP_VERSION"

      - name: Check plugin
        run: |
          bun run type-check
          bun run check
          bun run test

      - name: Build plugin
        run: bun run build

      - name: Create release archive
        run: |
          cd dist
          zip -r ../discord-message-sender-${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            discord-message-sender-${{ github.ref_name }}.zip
            dist/manifest.json
            dist/main.js
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
